name: Validate

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          cache: pip
          cache-dependency-path: pyproject.toml
          python-version: 3.14.2
      - name: Install Python tooling
        run: python -m pip install ".[dev]"
      - name: Check Python formatting
        run: python -m ruff format --check .
      - name: Lint Python
        run: python -m ruff check .
      - name: Type-check Python
        run: python -m mypy custom_components tests
      - name: Test Python
        run: python -m pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          node-version: 24
      - name: Install frontend tooling
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Type-check frontend
        run: npm run typecheck
      - name: Test frontend
        run: npm test
      - name: Build frontend
        run: npm run build

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Validate Home Assistant metadata
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Validate HACS integration metadata
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # v22.5.0
        with:
          category: integration
